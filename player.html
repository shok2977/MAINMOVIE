<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play | ZyroMovies</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&family=Sen:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"
    />
    <!-- videojs-vast-vpaid (MailOnline) supports Video.js 4/5 builds.
         Your current setup used Video.js 8, which makes `player.vastClient` undefined. -->
    <link href="https://vjs.zencdn.net/5.4.6/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/5.4.6/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-ads@5.1.2/dist/videojs.ads.min.js"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/videojs-vast-vpaid/2.0.2/videojs.vast.vpaid.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-vast-vpaid/2.0.2/videojs_5.vast.vpaid.min.js"></script>
    <style>
      #player-box video,
      #player-box iframe {
        width: 100%;
        height: 500px;
        border: 0;
      }
      /* Force video.js tech (ads) to fill container */
      #player-box .video-js {
        width: 100% !important;
        height: 500px !important;
      }
      #player-box .vjs-tech {
        width: 100% !important;
        height: 500px !important;
        object-fit: contain;
      }
    </style>
  </head>
  <body class="player-body">
    <div class="navbar">
      <div class="navbar-container">
        <div class="logo-container">
          <a href="index.html" style="text-decoration: none; color: rgb(0, 0, 0);">
          <h1 class="logo">ZyroMovies</h1></a>
        </div>
        <div class="menu-container">
          <ul class="menu-list">
            <li class="menu-list-item active">Now Playing</li>
          </ul>
        </div>
        <div class="search-container">
          <a href="index.html" class="admin-link">Back to Home</a>
        </div>
      </div>
    </div>

    <div class="container player-container">
      <div class="player-content">
        <div class="player-meta">
          <h1 id="player-title" class="player-title">Loading...</h1>
          <p id="player-overview" class="player-overview"></p>
        </div>
        <div id="player-languages" class="player-languages"></div>
        <div id="player-episodes" class="player-episodes"></div>
        <div id="player-box" class="player-embed-wrapper">
          <video
            id="ad-player"
            class="video-js vjs-default-skin vjs-big-play-centered"
            controls
            width="100%"
            height="500"
          ></video>
        </div>
        <div class="player-audio-boost-wrapper" style="margin-top: 16px; text-align: center;">
          <a href="audio-boost.html" class="player-audio-boost-button" style="display: inline-block; padding: 10px 20px; background-color: #e50914; color: #fff; border-radius: 4px; text-decoration: none; font-weight: 500;">
            Audio boost
          </a>
        </div>
      </div>
    </div>
    

    <script src="player.js"></script>
  </body>
</html>
